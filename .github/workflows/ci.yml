name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  php-lint:
    name: PHP ${{ matrix.php }} lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['7.4', '8.1', '8.3']
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          ini-values: error_reporting=E_ALL, display_errors=On

      - name: Lint all PHP files
        run: |
          set -e
          fail=0
          while IFS= read -r f; do
            if ! php -l "$f"; then
              fail=1
            fi
          done < <(find . -name '*.php' -not -path './vendor/*')
          exit "$fail"

      - name: Verify no syntax errors in main plugin file
        run: php -l wp-phorest-reviews.php
